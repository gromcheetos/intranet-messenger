version: "3.9"

services:

  # ── Local dev DB (Oracle) ──────────────────────────────────
  oracle:
    image: gvenzl/oracle-xe:latest
    container_name: hkapp-oracle
    ports:
      - "1523:1521"
    environment:
      ORACLE_PASSWORD: "system123"
    volumes:
      - ./oracle-data:/opt/oracle/oradata
      - ./dumps:/opt/oracle/dumps
    profiles:
      - oracle   # only starts with: docker-compose --profile oracle up

  # ── Local dev DB (PostgreSQL) ─────────────────────────────
  # Use this to test before deploying to Supabase
  postgres:
    image: postgres:16
    container_name: hkapp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: messenger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    profiles:
      - postgres   # only starts with: docker-compose --profile postgres up

  # ── Spring Boot backend ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hkapp-backend
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DATABASE_URL: ${DATABASE_URL:-jdbc:oracle:thin:@localhost:1523/XEPDB1}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-system}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-system123}
    depends_on:
      - postgres
    profiles:
      - app   # only starts with: docker-compose --profile app up

volumes:
  postgres-data: